<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WEDANGJP - Tembakikan</title>
  <style>
.topup-modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:9999;
}

.topup-box{
width:320px;
background:#1b1b1b;
border-radius:14px;
padding:18px;
color:#fff;
}

.topup-title{
font-size:18px;
font-weight:bold;
text-align:center;
margin-bottom:15px;
color:#FFD700;
}

.topup-item{
margin-bottom:12px;
}

.topup-item label{
display:block;
margin-bottom:5px;
font-size:13px;
}

.topup-item input{
width:100%;
height:42px;
border:none;
border-radius:8px;
padding:10px;
font-size:14px;
}

.topup-btn{
display:flex;
gap:10px;
margin-top:15px;
}

.btnTopup,
.btnClose{
flex:1;
height:42px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btnTopup{
background:#FFD700;
color:#000;
}

.btnClose{
background:#555;
color:#fff;
}    
*{box-sizing:border-box}body{margin:0;background:#000;font-family:Arial,sans-serif}
.game-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;max-width:480px;margin:auto}
.game-card{background:#181818;border-radius:12px;overflow:hidden}
.game-card img{width:100%;height:95px;object-fit:cover;display:block}
.game-info{padding:6px}
.game-title{color:#fff;font-size:12px;font-weight:bold;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.game-btn{display:flex;gap:5px}
.game-btn a{flex:1;height:28px;border-radius:6px;text-decoration:none;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center}
.demo{background:#3b3b3b;color:#fff}.main{background:#ffd21a;color:#000}
</style>
</head>

<div class="topup-modal" id="topupModal">

<div class="topup-box">

<div class="topup-title">
💰 TOP UP SALDO
</div>

<div class="topup-item">
<label>Saldo Dompet</label>
<input value="Rp 0" readonly>
</div>

<div class="topup-item">
<label>Saldo Game</label>
<input value="Rp 0" readonly>
</div>

<div class="topup-item">
<label>Nominal Top Up</label>
<input id="nominalTopup" type="number" placeholder="Contoh : 100000">
</div>

<div class="topup-btn">

<button class="btnTopup" onclick="kirimTopup()">
TOP UP & MAIN
</button>

<button class="btnClose" onclick="closeTopup()">
Tutup
</button>

</div>

</div>

</div>
<script>

function openTopup(){

document.getElementById("topupModal").style.display="flex";

}

function closeTopup(){

document.getElementById("topupModal").style.display="none";

}

function kirimTopup(){

let nominal=document.getElementById("nominalTopup").value;

if(nominal==""){

alert("❌ Masukkan nominal top up.");

return;

}

// Simpan nominal agar bisa dipakai di deposit.html
localStorage.setItem("nominalDeposit", nominal);

// Pindah ke halaman deposit
window.location.href="deposit.html";

}

</script>
