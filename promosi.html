
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEDANGJP - Promosi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

.card{
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:25px;
    box-shadow:0 0 15px rgba(255,215,0,.15);
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:18px;
}

.content h2{
    color:#FFD700;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#FFD700;
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    background:#e6c200;
}
.detail{
    display:none;
    margin-top:15px;
    background:#111;
    color:#fff;
    border-left:4px solid #FFD700;
    padding:15px;
    border-radius:8px;
    line-height:1.8;
}
</style>

</head>
<body>

<div class="container">

     <!-- Banner 1 -->
    <div class="card">
        <img src="bener.png" alt="Promo 1">

        <div class="content">

            <h2>Bonus</h2>

            <button onclick="toggleDetail('detail1')">
                Baca Syarat & Ketentuan
            </button>

            <div class="detail" id="detail1">
                <p>

    </div>

<script>
function toggleDetail(id){

    const box = document.getElementById(id);

    if(box.style.display === "block"){
        box.style.display = "none";
    }else{
        box.style.display = "block";
    }

}
</script>
